[llm."google/gemini-3-flash-preview"]
api_key_env = "ZENMUX_API_KEY"
base_url = "https://zenmux.ai/api/v1"
model_name = "google/gemini-3-flash-preview"
input_cost_per_million_tokens = 0.50
output_cost_per_million_tokens = 3.00

# --- Executor Configuration ---
[executor]
active_backend = "opencode"

[executor.backends.claude_code]
binary = "claude"
args = ["--dangerously-skip-permissions", "--print"]
prompt_mode = "append"
timeout_seconds = 900

[executor.backends.codex]
binary = "codex"
args = ["exec", "--skip-git-repo-check", "--color", "never", "--dangerously-bypass-approvals-and-sandbox"]
prompt_mode = "stdin"
timeout_seconds = 900

[executor.backends.opencode]
binary = "opencode"
args = []
prompt_mode = "append"
timeout_seconds = 900

[executor.backends.pi]
binary = "pi"
args = []
prompt_mode = "append"
timeout_seconds = 900

# --- System Configuration ---
[system]
max_attempts = 3
workspace_dir = "workspace/tasks"
shell = "/usr/bin/zsh"

# --- Memory Configuration ---
[memory]
mode = "frozen_train" # accumulate_eval | frozen_train | reset
retrieve_k = 6
strategy_k = 3
failure_k = 2
dataset_k = 1
writeback_on_failure = true

# --- Optional EHR Overlay Configuration ---
[ehr]
enable_profile = true
enable_risk_checks = true
max_preview_rows = 3

# --- Verification Configuration ---
[verification]
require_verifier_pass = true
required_report_sections = ["Task Summary", "Data Profile", "Method", "Verification", "Limitations"]

# --- Evaluation Configuration ---
[evaluation]
success_threshold = 8.0

# --- Logging Configuration ---
[logging]
log_level = "INFO"
log_file = "healthflow.log"
