# HealthFlow Configuration
# Export ZENMUX_API_KEY before running HealthFlow.

[llm."minimax/minimax-m2.7"]
api_key_env = "ZENMUX_API_KEY"
base_url = "https://zenmux.ai/api/v1"
model_name = "minimax/minimax-m2.7"
input_cost_per_million_tokens = 0.31
output_cost_per_million_tokens = 1.22

[llm."deepseek/deepseek-v3.2"]
api_key_env = "ZENMUX_API_KEY"
base_url = "https://zenmux.ai/api/v1"
model_name = "deepseek/deepseek-v3.2"
input_cost_per_million_tokens = 0.28
output_cost_per_million_tokens = 0.43

[llm."z-ai/glm-5"]
api_key_env = "ZENMUX_API_KEY"
base_url = "https://zenmux.ai/api/v1"
model_name = "z-ai/glm-5"
input_cost_per_million_tokens = 0.56
output_cost_per_million_tokens = 2.52

[llm."qwen/qwen3.5-flash"]
api_key_env = "ZENMUX_API_KEY"
base_url = "https://zenmux.ai/api/v1"
model_name = "qwen/qwen3.5-flash"
input_cost_per_million_tokens = 0.10
output_cost_per_million_tokens = 0.40

[llm."openai/gpt-5.4"]
api_key_env = "ZENMUX_API_KEY"
base_url = "https://zenmux.ai/api/v1"
model_name = "openai/gpt-5.4"
input_cost_per_million_tokens = 2.50
output_cost_per_million_tokens = 15.00

[llm."google/gemini-3-flash-preview"]
api_key_env = "ZENMUX_API_KEY"
base_url = "https://zenmux.ai/api/v1"
model_name = "google/gemini-3-flash-preview"
input_cost_per_million_tokens = 0.50
output_cost_per_million_tokens = 3.00

# --- Executor Configuration ---
[executor]
active_backend = "opencode"

[executor.backends.claude_code]
binary = "claude"
args = ["--dangerously-skip-permissions", "--print"]
prompt_mode = "append"
timeout_seconds = 1800

[executor.backends.codex]
binary = "codex"
args = ["exec", "--skip-git-repo-check", "--color", "never", "--dangerously-bypass-approvals-and-sandbox"]
prompt_mode = "stdin"
timeout_seconds = 1800

[executor.backends.opencode]
binary = "opencode"
args = []
prompt_mode = "append"
timeout_seconds = 1800

[executor.backends.pi]
binary = "pi"
args = []
prompt_mode = "append"
timeout_seconds = 1800

# --- System Configuration ---
[system]
max_attempts = 3
workspace_dir = "workspace/tasks"
shell = "/usr/bin/zsh"

# --- Memory Configuration ---
[memory]
write_policy = "freeze" # append | freeze | reset_before_run

# --- Evaluation Configuration ---
[evaluation]
success_threshold = 8.0

# --- Logging Configuration ---
[logging]
log_level = "INFO"
log_file = "healthflow.log"
