<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 224 224" role="img" aria-labelledby="healthflowIconTitle healthflowIconDesc">
  <title id="healthflowIconTitle">HealthFlow dynamic medical icon</title>
  <desc id="healthflowIconDesc">A rounded blue badge with a glowing medical cross, an ECG pulse, and flowing circular arcs suggesting motion and care.</desc>

  <defs>
    <linearGradient id="bgGrad" x1="28" y1="24" x2="196" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#19B8FF"/>
      <stop offset="1" stop-color="#146BFF"/>
    </linearGradient>

    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(86 70) rotate(44) scale(126)">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".28"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="flowGradA" x1="56" y1="148" x2="176" y2="76" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6BE8FF"/>
      <stop offset=".55" stop-color="#B6F7FF"/>
      <stop offset="1" stop-color="#E7FFFC"/>
    </linearGradient>

    <linearGradient id="flowGradB" x1="168" y1="92" x2="78" y2="170" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#D9FFFB"/>
      <stop offset="1" stop-color="#72E9FF"/>
    </linearGradient>

    <linearGradient id="pulseGrad" x1="84" y1="100" x2="140" y2="124" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#15A7FF"/>
      <stop offset="1" stop-color="#00D2D7"/>
    </linearGradient>

    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#0A4FCC" flood-opacity=".22"/>
    </filter>
  </defs>

  <rect x="20" y="20" width="184" height="184" rx="56" fill="url(#bgGrad)"/>
  <rect x="20" y="20" width="184" height="184" rx="56" fill="url(#bgGlow)"/>

  <path
    d="M60 143 A68 68 0 1 1 170 78"
    fill="none"
    stroke="url(#flowGradA)"
    stroke-width="18"
    stroke-linecap="round"
    opacity=".95"
  />

  <path
    d="M164 96 A56 56 0 1 1 80 164"
    fill="none"
    stroke="url(#flowGradB)"
    stroke-width="10"
    stroke-linecap="round"
    opacity=".78"
  />

  <circle cx="171" cy="79" r="7" fill="#DFFFFB"/>
  <circle cx="60" cy="143" r="5" fill="#8EE7FF"/>

  <g filter="url(#softShadow)">
    <rect x="95" y="74" width="34" height="76" rx="17" fill="#FFFFFF"/>
    <rect x="74" y="95" width="76" height="34" rx="17" fill="#FFFFFF"/>
  </g>

  <path
    d="M84 112h14l8-15 10 28 9-18h15"
    fill="none"
    stroke="url(#pulseGrad)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
  />
</svg>
